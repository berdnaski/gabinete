services:
  db:
    container_name: gabinete
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db_gabinete
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    container_name: gabinete-redis
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

volumes:
  db_data:
